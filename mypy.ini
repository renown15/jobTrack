[mypy]
# Project-wide mypy settings for incremental adoption.
python_version = 3.14

# Skip third-party stub errors during initial adoption — we'll enable stricter
# checks incrementally for owned modules.
ignore_missing_imports = True

# Exclude generated/build and tools directories which contain duplicate
# or non-library scripts that confuse module mapping. Include `tools-python/`
# which is a non-standard helper folder used for local tooling and should be
# excluded from static checks.
exclude = ^(build/|tools/|tools-python/|scripts/|htmlcov/|out/|venv/|venv-m4/|\.venv/)

# Be permissive by default and focus checks on our application modules.
# Focus mypy on application packages under the repo root. Use directory names
# rather than a brittle space-separated file list that can be misinterpreted.
files = backend jobtrack jobtrack_navigator_ai jobtrack_ai leads

[mypy-app]
# Allow unannotated functions in the application entry file for now.
disallow_untyped_defs = False

[mypy-jobtrack_navigator_ai.*]
# This package contains large AI integration code that is currently
# dynamically typed. Ignore errors here while we incrementally add
# annotations to the rest of the codebase.
ignore_errors = True

[mypy-jobtrack_ai]
ignore_errors = True

[mypy-leads]
ignore_errors = True

[mypy-tools.*]
ignore_errors = True
