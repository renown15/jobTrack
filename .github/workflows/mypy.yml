---
name: Mypy type-check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  mypy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v3
        with:
          python-version: '3.11'

      - name: Prepare Python
        run: |
          python -m pip install --upgrade pip setuptools wheel

      - name: Install mypy and type stubs
        run: |
          python -m pip install --no-cache-dir mypy
          # Install commonly-missing stubs used in this repo
          python -m pip install --no-cache-dir types-requests
          python -m pip install --no-cache-dir types-openpyxl
          python -m pip install --no-cache-dir types-psycopg2
          # Ensure mypy can auto-install any remaining types non-interactively
          mypy --install-types --non-interactive || true

      - name: Run mypy
        run: |
          mypy --show-error-codes --pretty .
